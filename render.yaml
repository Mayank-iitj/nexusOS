services:
  - type: web
    name: nexusos-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexusos-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexusos-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://nexusos.vercel.app

  - type: redis
    name: nexusos-redis
    ipAllowList: [] # only allow internal connections
    plan: free

databases:
  - name: nexusos-db
    databaseName: nexusos
    user: nexus
    plan: free
